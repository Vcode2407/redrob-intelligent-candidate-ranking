ai_usage_summary: |
  Used AI assistance to analyze challenge documents, design the ranking rubric,
  and implement/review code. No external AI APIs are used during ranking.

methodology_summary: |
  Deterministic CPU-only ranker using field-aware evidence scoring. Career-history
  production retrieval/ranking evidence dominates skill-list keywords. The model
  combines technical match, experience relevance, career quality, behavioral
  availability, and explicit risk penalties for keyword stuffing, consulting-only
  profiles, pure research without production, and honeypot patterns.

